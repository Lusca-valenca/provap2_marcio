services:
  web:
    build: .
    container_name: django-shop-web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "1"
      SECRET_KEY: "dev-secret-key"
      ALLOWED_HOSTS: "*"
