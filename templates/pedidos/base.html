<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Django Shop{% endblock %}</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --card: #22263a;
    --border: #2e3452;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --text: #e8eaf6;
    --muted: #8892b0;
    --success: #00d4aa;
    --warning: #ffd166;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { color: var(--accent2); }

  .navbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky; top: 0; z-index: 100;
  }
  .navbar-brand { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .navbar-links { display: flex; gap: 1.5rem; }
  .navbar-links a { color: var(--muted); font-size: 0.9rem; font-weight: 500; transition: color .2s; }
  .navbar-links a:hover { color: var(--text); }

  .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .card-title { font-size: 1.1rem; font-weight: 600; }

  .btn {
    display: inline-block; padding: 0.55rem 1.25rem;
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 0.875rem; font-weight: 600;
    transition: all .2s; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #8077ff; color: #fff; }
  .btn-success { background: var(--success); color: #000; }
  .btn-success:hover { background: #00b894; color: #000; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .badge {
    display: inline-block; padding: 0.25rem 0.65rem;
    border-radius: 20px; font-size: 0.75rem; font-weight: 600;
  }
  .badge-confirmado { background: #1e3a5f; color: #90caf9; }
  .badge-em_separacao { background: #3a2e00; color: var(--warning); }
  .badge-enviado { background: #1b3a2e; color: var(--accent2); }
  .badge-entregue { background: #1b3a1b; color: #a5d6a7; }
  .badge-cancelado { background: #3a1b1b; color: var(--danger); }
  .badge-rascunho { background: #2a2a3a; color: var(--muted); }

  .pattern-tag {
    display: inline-block; padding: 0.2rem 0.6rem;
    border-radius: 6px; font-size: 0.72rem; font-weight: 700;
    letter-spacing: 0.05em; margin: 0.15rem;
  }
  .tag-singleton { background: #2d1f6e; color: #b39ddb; }
  .tag-factory { background: #1f4a2d; color: #80cbc4; }
  .tag-observer { background: #4a2d1f; color: #ffcc80; }
  .tag-strategy { background: #1f2d4a; color: #90caf9; }
  .tag-facade { background: #4a1f3a; color: #f48fb1; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }

  .alert { padding: 0.85rem 1.1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; }
  .alert-success { background: #1b3a2e; border: 1px solid var(--success); color: var(--success); }
  .alert-error { background: #3a1b1b; border: 1px solid var(--danger); color: var(--danger); }

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th { text-align: left; padding: 0.65rem 0.75rem; color: var(--muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
  td { padding: 0.75rem; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(108,99,255,0.04); }

  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; font-weight: 500; }
  input, select, textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 0.6rem 0.85rem; border-radius: 8px; font-size: 0.9rem;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }

  .stat-box { text-align: center; padding: 1rem; }
  .stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 0.25rem; }

  .timeline { position: relative; padding-left: 1.5rem; }
  .timeline::before { content: ''; position: absolute; left: 0.4rem; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline-item { position: relative; margin-bottom: 1rem; padding: 0.75rem 1rem; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); }
  .timeline-item::before { content: ''; position: absolute; left: -1.25rem; top: 1rem; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; }

  .pattern-info { background: var(--surface); border: 1px solid var(--accent); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .pattern-info h4 { color: var(--accent); margin-bottom: 0.5rem; font-size: 0.9rem; }
  .pattern-info p { color: var(--muted); font-size: 0.85rem; line-height: 1.6; }

  @media (max-width: 768px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .container { padding: 1rem; }
  }
</style>
</head>
<body>
<nav class="navbar">
  <span class="navbar-brand">🛒 Django Shop</span>
  <div class="navbar-links">
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'novo_pedido' %}">+ Novo Pedido</a>
    <a href="{% url 'demonstracao' %}">📐 Padrões</a>
    <a href="/admin/">Admin</a>
  </div>
</nav>
<div class="container">
  {% for msg in messages %}
    <div class="alert alert-{% if msg.tags == 'error' %}error{% else %}success{% endif %}">{{ msg }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
